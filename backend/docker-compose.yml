services:
  api:
    build: .
    ports:
      - "38090:38090"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  scheduler:
    build: .
    command: ["python", "scheduler_main.py"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: shotpocket
      POSTGRES_PASSWORD: shotpocket
      POSTGRES_DB: shotpocket
    # 로컬 개발: 호스트 venv(uvicorn/seed/pipeline)에서 접속하기 위한 포트 공개.
    # 5432 는 타 프로젝트가 점유할 수 있어 55432 로 매핑(운영은 내부 네트워크만 사용).
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # 최초 기동 시 스키마/테이블 적용 (알파벳 순 실행)
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shotpocket -d shotpocket"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # 로컬 개발: 호스트 venv에서 접속하기 위한 포트 공개(운영은 내부 네트워크만).
    ports:
      - "127.0.0.1:63790:6379"
    restart: unless-stopped

volumes:
  db_data:
